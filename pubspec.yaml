name: flutter_oklyn_mobile
description: "Flutter Oklyn Mobile - Clean Architecture with BLoC, go_router, and Dio"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  bloc: ^8.1.0
  dio: ^5.0.0
  flutter_bloc: ^8.1.0
  flutter_dotenv: ^5.1.0
  flutter_secure_storage: ^9.0.0
  formz: ^0.7.0
  fpdart: ^1.1.0
  get_it: ^7.6.0
  go_router: ^14.0.0
  json_annotation: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: ^9.1.0
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

