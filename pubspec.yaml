name: flutter_oklyn_mobile
description: "Flutter Oclyn Mobile - Clean Architecture with BLoC, go_router, and Dio"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  bloc: 8.1.4
  dio: 5.9.2
  equatable: 2.0.8
  flutter_bloc: 8.1.6
  flutter_dotenv: 5.2.1
  flutter_secure_storage: 9.2.4
  formz: 0.7.0
  fpdart: 1.2.0
  get_it: 7.7.0
  go_router: 14.8.1
  http_parser: ^4.0.0
  image_picker: ^1.1.2
  intl: 0.19.0
  json_annotation: 4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: 9.1.7
  build_runner: 2.4.15
  flutter_lints: 4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1
  json_serializable: 6.9.5
  mocktail: 1.0.5

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/icon.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/icon.png
  android: true
  ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
