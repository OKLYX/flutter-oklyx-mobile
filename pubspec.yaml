name: flutter_oklyn_mobile
description: "Flutter Oklyn Mobile - Clean Architecture with BLoC, go_router, and Dio"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  bloc: 8.1.4
  dio: 5.9.2
  equatable: 2.0.8
  flutter_bloc: 8.1.6
  flutter_dotenv: 5.2.1
  flutter_secure_storage: 9.2.4
  formz: 0.7.0
  fpdart: 1.2.0
  get_it: 7.7.0
  go_router: 14.8.1
  json_annotation: 4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  bloc_test: 9.1.7
  build_runner: 2.4.15
  flutter_lints: 4.0.0
  json_serializable: 6.9.5
  mocktail: 1.0.5

flutter:
  uses-material-design: true

  # Assets (add if needed later)
  # assets:
  #   - assets/images/
  #   - assets/icons/
  #   - .env
